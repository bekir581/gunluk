<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OVERDRIVE COMMAND CENTER // THE ARCHITECT</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@300;400;700&family=Orbitron:wght@400;700;900&display=swap');

        :root {
            --bg-color: #030303;
            --main-gold: #ffd700;
            --dark-gold: #b38f00;
            --dim-text: #666;
            --alert-red: #ff3333;
            --panel-bg: rgba(10, 10, 10, 0.85);
            --border-glow: 0 0 15px rgba(255, 215, 0, 0.15);
        }

        * { box-sizing: border-box; }
        
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: var(--bg-color);
            color: var(--main-gold);
            font-family: 'Fira Code', monospace;
            overflow: hidden; /* Prevent native scrolling, use custom panes */
        }

        /* --- BACKGROUND CANVAS & EFFECTS --- */
        #network-canvas {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 0; pointer-events: none; opacity: 0.4;
        }

        .crt-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            background-size: 100% 2px, 3px 100%;
            z-index: 999; pointer-events: none; opacity: 0.6;
        }

        /* --- MAIN GRID ARCHITECTURE --- */
        .hud-wrapper {
            position: relative; z-index: 10;
            display: grid;
            grid-template-columns: 350px 1fr 300px;
            grid-template-rows: 80px 1fr 200px;
            gap: 15px; padding: 15px;
            height: 100vh;
        }

        .panel {
            background: var(--panel-bg);
            border: 1px solid #222;
            backdrop-filter: blur(5px);
            position: relative;
            display: flex; flex-direction: column;
            overflow: hidden;
            box-shadow: inset 0 0 20px rgba(0,0,0,1);
        }

        /* Sci-Fi Panel Corners */
        .panel::before, .panel::after { content: ''; position: absolute; width: 15px; height: 15px; }
        .panel::before { top: 0; left: 0; border-top: 2px solid var(--dark-gold); border-left: 2px solid var(--dark-gold); }
        .panel::after { bottom: 0; right: 0; border-bottom: 2px solid var(--dark-gold); border-right: 2px solid var(--dark-gold); }

        .panel-header {
            background: linear-gradient(90deg, #111, transparent);
            padding: 10px; font-family: 'Orbitron', sans-serif;
            font-size: 0.8rem; letter-spacing: 3px;
            border-bottom: 1px solid #333;
            text-transform: uppercase; display: flex; justify-content: space-between;
        }

        /* --- SPECIFIC MODULES --- */
        /* TOP BAR */
        .mod-header { grid-column: 1 / -1; display: flex; justify-content: space-between; align-items: center; padding: 0 20px; border-bottom: 2px solid var(--dark-gold); }
        .sys-title { font-family: 'Orbitron', sans-serif; font-size: 2rem; font-weight: 900; letter-spacing: 5px; text-shadow: 0 0 10px var(--main-gold); }
        .sys-clock { font-size: 1.5rem; }

        /* LEFT PANEL: UPLINK & DIAGNOSTICS */
        .mod-uplink { grid-column: 1; grid-row: 2 / 4; padding: 15px; }
        
        .input-group { display: flex; flex-direction: column; gap: 10px; flex-grow: 1; }
        input, textarea {
            background: rgba(0, 0, 0, 0.5); border: 1px solid #444; color: #fff;
            padding: 12px; font-family: 'Fira Code', monospace; outline: none;
            transition: all 0.3s;
        }
        input:focus, textarea:focus { border-color: var(--main-gold); box-shadow: inset 0 0 10px rgba(255, 215, 0, 0.2); }
        textarea { height: 200px; resize: none; }
        
        button.execute-btn {
            background: transparent; color: var(--main-gold);
            border: 1px solid var(--main-gold); padding: 15px;
            font-family: 'Orbitron', sans-serif; font-weight: bold; letter-spacing: 2px;
            cursor: pointer; position: relative; overflow: hidden; transition: 0.3s;
        }
        button.execute-btn:hover { background: var(--main-gold); color: #000; box-shadow: var(--border-glow); }
        button.execute-btn:disabled { border-color: #333; color: #555; cursor: not-allowed; }

        /* CENTER PANEL: THE LEDGER */
        .mod-ledger { grid-column: 2; grid-row: 2 / 4; }
        .ledger-content { padding: 20px; overflow-y: auto; height: 100%; display: flex; flex-direction: column; gap: 15px; }
        
        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: #000; }
        ::-webkit-scrollbar-thumb { background: var(--dark-gold); }

        .entry-card {
            background: rgba(20, 20, 20, 0.7); border-left: 2px solid var(--dark-gold);
            padding: 15px; position: relative; transition: 0.2s;
        }
        .entry-card:hover { background: rgba(30, 30, 30, 0.9); border-left-color: #fff; }
        .entry-meta { font-size: 0.75rem; color: var(--dim-text); margin-bottom: 10px; display: flex; justify-content: space-between; border-bottom: 1px dashed #333; padding-bottom: 5px; }
        .entry-text { font-size: 0.95rem; line-height: 1.6; color: #e0e0e0; white-space: pre-wrap; }

        /* RIGHT PANEL: COGNITIVE CORE & NODE STREAM */
        .mod-cognitive { grid-column: 3; grid-row: 2; }
        .quote-box { padding: 15px; font-size: 0.85rem; line-height: 1.5; color: #aaa; font-style: italic; }
        .quote-author { display: block; margin-top: 10px; color: var(--main-gold); font-weight: bold; font-family: 'Orbitron', sans-serif; font-size: 0.7rem; text-align: right; }

        .mod-terminal { grid-column: 3; grid-row: 3; }
        .terminal-stream { padding: 10px; font-size: 0.7rem; color: #4caf50; height: 100%; overflow-y: hidden; display: flex; flex-direction: column; justify-content: flex-end; }
        .log-line { margin-bottom: 5px; opacity: 0.8; }
        
        .glitch-text { animation: glitch 1s linear infinite; }

        @keyframes glitch {
            2%, 64% { transform: translate(2px,0) skew(0deg); }
            4%, 60% { transform: translate(-2px,0) skew(0deg); }
            62% { transform: translate(0,0) skew(5deg); }
        }

        #status-display { margin-top: 15px; font-size: 0.8rem; text-align: center; height: 15px; color: var(--alert-red); }

    </style>
</head>
<body>

    <canvas id="network-canvas"></canvas>
    <div class="crt-overlay"></div>

    <div class="hud-wrapper">
        <div class="panel mod-header">
            <div class="sys-title">THE ARCHITECT <span style="font-size: 0.8rem; font-family: 'Fira Code'; color: #666;">v3.0.0</span></div>
            <div class="sys-clock" id="main-clock">00:00:00</div>
        </div>

        <div class="panel mod-uplink">
            <div class="panel-header"><span>[01] UPLINK_NODE</span> <span id="db-status">DISCONNECTED</span></div>
            <div class="input-group" style="margin-top: 20px;">
                <input type="password" id="master-key" placeholder="AUTHENTICATION_KEY_REQUIRED">
                <textarea id="diary-text" placeholder="> Initialize thought sequence...&#10;> Awaiting input stream..."></textarea>
                <button class="execute-btn" id="submit-btn" onclick="addEntry()">ENCRYPT & COMMIT</button>
                <div id="status-display"></div>
            </div>
            
            <div style="margin-top: auto; border-top: 1px solid #333; padding-top: 10px; font-size: 0.7rem; color: var(--dim-text);">
                <div>CPU: <span id="cpu-load">14</span>% | MEM: 0x4FA2</div>
                <div>SECURE CONNECTION: ESTABLISHED</div>
            </div>
        </div>

        <div class="panel mod-ledger">
            <div class="panel-header"><span>[02] MEMORY_LEDGER</span> <span id="entry-count">0 RECORDS</span></div>
            <div class="ledger-content" id="diary-entries">
                <div style="text-align: center; margin-top: 50px; color: #444;" class="glitch-text">SYNCHRONIZING DEEP STORAGE...</div>
            </div>
        </div>

        <div class="panel mod-cognitive">
            <div class="panel-header"><span>[03] COGNITIVE_CORE</span></div>
            <div class="quote-box" id="quote-display">
                </div>
        </div>

        <div class="panel mod-terminal">
            <div class="panel-header"><span>[04] ALGO_NODE_SIM</span></div>
            <div class="terminal-stream" id="terminal-stream">
                </div>
        </div>
    </div>

    <script>
        // ==========================================
        // CORE SYSTEM VARIABLES & API ROUTING
        // ==========================================
        const BIN_ID = "6a2b2c06f5f4af5e29e27ad5"; 
        const API_URL = `https://api.jsonbin.io/v3/b/${BIN_ID}`;
        let currentEntries = [];

        // ==========================================
        // MORRA'S CRYPTOGRAPHIC TEXT SCRAMBLER
        // ==========================================
        class TextScramble {
            constructor(el) {
                this.el = el;
                this.chars = '!<>-_\\/[]{}—=+*^?#________';
                this.update = this.update.bind(this);
            }
            setText(newText) {
                const oldText = this.el.innerText;
                const length = Math.max(oldText.length, newText.length);
                const promise = new Promise((resolve) => this.resolve = resolve);
                this.queue = [];
                for (let i = 0; i < length; i++) {
                    const from = oldText[i] || '';
                    const to = newText[i] || '';
                    const start = Math.floor(Math.random() * 40);
                    const end = start + Math.floor(Math.random() * 40);
                    this.queue.push({ from, to, start, end });
                }
                cancelAnimationFrame(this.frameRequest);
                this.frame = 0;
                this.update();
                return promise;
            }
            update() {
                let output = '';
                let complete = 0;
                for (let i = 0, n = this.queue.length; i < n; i++) {
                    let { from, to, start, end, char } = this.queue[i];
                    if (this.frame >= end) {
                        complete++;
                        output += to;
                    } else if (this.frame >= start) {
                        if (!char || Math.random() < 0.28) {
                            char = this.randomChar();
                            this.queue[i].char = char;
                        }
                        output += `<span style="color:#666">${char}</span>`;
                    } else {
                        output += from;
                    }
                }
                this.el.innerHTML = output;
                if (complete === this.queue.length) {
                    this.resolve();
                } else {
                    this.frameRequest = requestAnimationFrame(this.update);
                    this.frame++;
                }
            }
            randomChar() {
                return this.chars[Math.floor(Math.random() * this.chars.length)];
            }
        }

        // ==========================================
        // SYSTEM CLOCKS & FAKE DIAGNOSTICS
        // ==========================================
        setInterval(() => {
            const now = new Date();
            const timeStr = now.toLocaleTimeString('tr-TR', { hour12: false });
            const ms = String(now.getMilliseconds()).padStart(3, '0');
            document.getElementById('main-clock').innerText = `${timeStr}:${ms}`;
            
            // Fake CPU Fluctuation
            if(Math.random() > 0.7) {
                document.getElementById('cpu-load').innerText = Math.floor(Math.random() * 30) + 10;
            }
        }, 85);

        // ==========================================
        // BACKGROUND TERMINAL SIMULATOR (NODE.JS/BINANCE)
        // ==========================================
        const termStream = document.getElementById('terminal-stream');
        const termLogs = [
            "Fetch: binance.com/api/v3/depth?symbol=BTCUSDT",
            "Analyzing Polymarket contract thresholds...",
            "[WARN] Spread divergence detected: 0.04%",
            "Executing arbitrage payload module...",
            "WebSocket connected to OrderBook stream.",
            "Node.js execution cycle completed in 14ms."
        ];

        setInterval(() => {
            const log = document.createElement('div');
            log.className = 'log-line';
            const rndLog = termLogs[Math.floor(Math.random() * termLogs.length)];
            const hash = "0x" + Math.random().toString(16).substr(2, 6).toUpperCase();
            log.innerText = `[${hash}] ${rndLog}`;
            termStream.appendChild(log);
            if(termStream.children.length > 6) {
                termStream.removeChild(termStream.firstChild);
            }
        }, 2500);

        // ==========================================
        // COGNITIVE CORE (PHILOSOPHICAL INJECTIONS)
        // ==========================================
        const quotes = [
            { text: "Her şeyin en iyisini bilmek, hiçbir şey yapmamak için mükemmel bir bahanedir.", author: "F. DOSTOYEVSKY // NOTES FROM UNDERGROUND" },
            { text: "Yaşama nedeni denilen şey, aynı zamanda çok güzel bir ölme nedenidir.", author: "A. CAMUS // THE MYTH OF SISYPHUS" },
            { text: "Dünyanın bütün eksikliklerine rağmen, birinin görevini yapması için gereken sessiz cesaret.", author: "H. MELVILLE // MOBY DICK" }
        ];
        
        function rotateQuote() {
            const display = document.getElementById('quote-display');
            const rnd = quotes[Math.floor(Math.random() * quotes.length)];
            display.innerHTML = `<div id="scramble-quote"></div><span class="quote-author">${rnd.author}</span>`;
            const scrambler = new TextScramble(document.getElementById('scramble-quote'));
            scrambler.setText(`"${rnd.text}"`);
        }
        rotateQuote();
        setInterval(rotateQuote, 15000); // Change quote every 15s

        // ==========================================
        // DATA LEDGER LOGIC (API FETCH & PUSH)
        // ==========================================
        async function fetchEntries() {
            const dbStatus = document.getElementById('db-status');
            try {
                const response = await fetch(`${API_URL}/latest`);
                const data = await response.json();
                currentEntries = data.record;
                
                dbStatus.innerText = "CONNECTED";
                dbStatus.style.color = "#4caf50";
                document.getElementById('entry-count').innerText = `${currentEntries.length} RECORDS`;
                
                renderEntries(currentEntries);
            } catch (error) {
                dbStatus.innerText = "LINK FAILED";
                dbStatus.style.color = "var(--alert-red)";
                document.getElementById('diary-entries').innerHTML = "<div style='color:red; text-align:center;'>FATAL ERROR: STORAGE UNREACHABLE</div>";
            }
        }

        function renderEntries(entriesArray) {
            const container = document.getElementById('diary-entries');
            container.innerHTML = '';
            
            [...entriesArray].reverse().forEach((entry) => {
                const card = document.createElement('div');
                card.className = 'entry-card';
                
                // UUID for aesthetic architecture
                const memHash = "MEM-" + Math.random().toString(36).substr(2, 8).toUpperCase();
                
                card.innerHTML = `
                    <div class="entry-meta">
                        <span>${entry.date}</span>
                        <span>[${memHash}]</span>
                    </div>
                    <div class="entry-text scramble-target" data-text="${encodeURIComponent(entry.text)}"></div>
                `;
                container.appendChild(card);
            });

            // Apply scramble effect to newly rendered text
            document.querySelectorAll('.scramble-target').forEach(el => {
                const decodedText = decodeURIComponent(el.getAttribute('data-text'));
                const scrambler = new TextScramble(el);
                scrambler.setText(decodedText);
            });
        }

        async function addEntry() {
            const masterKey = document.getElementById('master-key').value;
            const text = document.getElementById('diary-text').value;
            const statusMsg = document.getElementById('status-display');
            const submitBtn = document.getElementById('submit-btn');

            if (!masterKey || !text) {
                statusMsg.innerText = "ERR 400: PAYLOAD OR KEY MISSING";
                return;
            }

            statusMsg.style.color = "var(--main-gold)";
            statusMsg.innerText = "ENCRYPTING DATA UPLINK...";
            submitBtn.disabled = true;
            submitBtn.innerText = "TRANSMITTING";

            const newEntry = {
                date: new Date().toLocaleString('tr-TR'),
                text: text
            };
            currentEntries.push(newEntry);

            try {
                const response = await fetch(API_URL, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-Master-Key': masterKey
                    },
                    body: JSON.stringify(currentEntries)
                });

                if (response.ok) {
                    statusMsg.style.color = "#4caf50";
                    statusMsg.innerText = "SUCCESS: BLOCK WRITTEN TO LEDGER";
                    document.getElementById('diary-text').value = ''; 
                    document.getElementById('entry-count').innerText = `${currentEntries.length} RECORDS`;
                    renderEntries(currentEntries); 
                } else {
                    statusMsg.style.color = "var(--alert-red)";
                    statusMsg.innerText = "AUTH FAILED: INVALID KEY STRUCTURE";
                    currentEntries.pop(); 
                }
            } catch (error) {
                statusMsg.style.color = "var(--alert-red)";
                statusMsg.innerText = "ERR 502: UPLINK SEVERED";
                currentEntries.pop();
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerText = "ENCRYPT & COMMIT";
                setTimeout(() => { statusMsg.innerText = ""; }, 4000);
            }
        }

        // ==========================================
        // MORIARTY'S NETWORK CANVAS BACKGROUND
        // ==========================================
        const canvas = document.getElementById('network-canvas');
        const ctx = canvas.getContext('2d');
        let width, height, particles = [];

        function initCanvas() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            particles = [];
            for(let i=0; i<60; i++) {
                particles.push({
                    x: Math.random() * width,
                    y: Math.random() * height,
                    vx: (Math.random() - 0.5) * 0.5,
                    vy: (Math.random() - 0.5) * 0.5
                });
            }
        }

        function drawNetwork() {
            ctx.clearRect(0, 0, width, height);
            ctx.fillStyle = 'rgba(255, 215, 0, 0.5)';
            ctx.strokeStyle = 'rgba(255, 215, 0, 0.1)';
            
            for(let i=0; i<particles.length; i++) {
                let p = particles[i];
                p.x += p.vx; p.y += p.vy;
                
                if(p.x < 0 || p.x > width) p.vx *= -1;
                if(p.y < 0 || p.y > height) p.vy *= -1;
                
                ctx.beginPath();
                ctx.arc(p.x, p.y, 1.5, 0, Math.PI * 2);
                ctx.fill();
                
                for(let j=i+1; j<particles.length; j++) {
                    let p2 = particles[j];
                    let dist = Math.hypot(p.x - p2.x, p.y - p2.y);
                    if(dist < 150) {
                        ctx.beginPath();
                        ctx.moveTo(p.x, p.y);
                        ctx.lineTo(p2.x, p2.y);
                        ctx.lineWidth = 1 - (dist / 150);
                        ctx.stroke();
                    }
                }
            }
            requestAnimationFrame(drawNetwork);
        }

        window.addEventListener('resize', initCanvas);
        initCanvas();
        drawNetwork();

        // INITIATE BOOT SEQUENCE
        setTimeout(fetchEntries, 1000);

    </script>
</body>
</html>
