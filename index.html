<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Günlüğüm</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #121212;
            color: #e0e0e0;
            max-width: 600px;
            margin: 0 auto;
            padding: 20px;
        }
        h1 {
            border-bottom: 2px solid #ffd700;
            padding-bottom: 10px;
        }
        .admin-panel {
            background-color: #1e1e1e;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 30px;
            border: 1px solid #333;
        }
        input, textarea {
            width: 100%;
            padding: 10px;
            margin-bottom: 15px;
            background-color: #2a2a2a;
            color: white;
            border: 1px solid #444;
            border-radius: 4px;
            box-sizing: border-box;
        }
        textarea {
            height: 100px;
            resize: vertical;
        }
        button {
            background-color: #ffd700;
            color: #121212;
            border: none;
            padding: 10px 20px;
            font-weight: bold;
            border-radius: 4px;
            cursor: pointer;
        }
        button:hover {
            background-color: #ffea00;
        }
        .entry {
            background-color: #1e1e1e;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 15px;
            border-left: 4px solid #ffd700;
        }
        .date {
            font-size: 0.8em;
            color: #888;
            margin-bottom: 10px;
        }
        #loading {
            color: #ffd700;
            font-style: italic;
        }
    </style>
</head>
<body>

    <h1>Kişisel Günlüğüm</h1>

    <div class="admin-panel">
        <h3>Yeni Giriş Ekle (Sadece Yetkili)</h3>
        <input type="password" id="master-key" placeholder="Master Key (Şifren)">
        <textarea id="diary-text" placeholder="Bugün neler oldu?"></textarea>
        <button onclick="addEntry()">Günlüğe Kaydet</button>
        <p id="status-msg" style="color: #ffd700; font-size: 0.9em;"></p>
    </div>

    <div id="loading">Günlükler yükleniyor...</div>
    <div id="diary-entries"></div>

    <script>
        // 1. ADIMDA ALDIĞIN BIN ID'Yİ BURAYA YAPIŞTIR
        const BIN_ID = "6a2b29d6da38895dfeb0ea40"; 
        
        const API_URL = `https://api.jsonbin.io/v3/b/${BIN_ID}`;
        let currentEntries = [];

        // Sayfa açıldığında verileri çek (Okuma işlemi herkese açıktır, şifre gerektirmez)
        async function fetchEntries() {
            try {
                const response = await fetch(`${API_URL}/latest`);
                const data = await response.json();
                currentEntries = data.record;
                renderEntries();
            } catch (error) {
                document.getElementById('loading').innerText = "Veriler çekilirken hata oluştu. Bin ID'ni kontrol et.";
            }
        }

        // Günlükleri ekrana yazdır
        function renderEntries() {
            const container = document.getElementById('diary-entries');
            document.getElementById('loading').style.display = 'none';
            container.innerHTML = '';

            // En yeni kayıt en üstte görünsün diye ters çeviriyoruz
            [...currentEntries].reverse().forEach(entry => {
                const div = document.createElement('div');
                div.className = 'entry';
                div.innerHTML = `<div class="date">${entry.date}</div><div>${entry.text}</div>`;
                container.appendChild(div);
            });
        }

        // Yeni yazı ekleme (Yazma işlemi Master Key gerektirir)
        async function addEntry() {
            const masterKey = document.getElementById('master-key').value;
            const text = document.getElementById('diary-text').value;
            const statusMsg = document.getElementById('status-msg');

            if (!masterKey || !text) {
                statusMsg.innerText = "Lütfen hem şifreni hem de günlük metnini gir.";
                return;
            }

            statusMsg.innerText = "Kaydediliyor...";

            // Yeni kaydı listeye ekle
            const newEntry = {
                date: new Date().toLocaleString('tr-TR'),
                text: text
            };
            currentEntries.push(newEntry);

            // Veritabanını güncelle
            try {
                const response = await fetch(API_URL, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-Master-Key': masterKey
                    },
                    body: JSON.stringify(currentEntries)
                });

                if (response.ok) {
                    statusMsg.innerText = "Başarıyla kaydedildi!";
                    document.getElementById('diary-text').value = ''; // Kutuyu temizle
                    renderEntries(); // Ekranı güncelle
                } else {
                    statusMsg.innerText = "Hata! Şifreni (Master Key) yanlış girmiş olabilirsin.";
                    currentEntries.pop(); // Hata verdiyse son ekleneni listeden geri al
                }
            } catch (error) {
                statusMsg.innerText = "Bağlantı hatası oluştu.";
            }
        }

        // Başlangıçta verileri çek
        fetchEntries();
    </script>
</body>
</html>
