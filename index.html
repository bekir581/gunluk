            color: #d0d0d0; /* Morra's clean, optimal visibility */
            max-width: 800px;
            margin: 0 auto;
            padding: 30px;
            overflow-x: hidden;
        }

        /* --- LOGO SECTION --- */
        #arch-header {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            border-bottom: 2px solid #b38f00; /* Deep gold accent */
            padding-bottom: 20px;
            margin-bottom: 40px;
        }

        #arch-logo {
            width: 50px;
            height: 50px;
            fill: #b38f00;
        }

        h1 {
            color: #b38f00;
            text-transform: uppercase;
            letter-spacing: 4px;
            font-size: 1.6rem;
            margin: 0;
            font-weight: 300;
        }

        /* --- AUTHENTICATION & INPUT (THE GATEKEEPER) --- */
        .admin-panel {
            background-color: rgba(20, 20, 20, 0.8);
            padding: 25px;
            border-radius: 4px;
            margin-bottom: 40px;
            border: 1px solid #222;
            box-shadow: 0 4px 15px rgba(0,0,0,0.7);
        }

        input, textarea {
            width: 100%;
            padding: 12px;
            margin-bottom: 18px;
            background-color: #1a1a1a;
            color: #ffd700; /* Distinct data entry color */
            border: 1px solid #333;
            border-radius: 2px;
            box-sizing: border-box;
            outline: none;
            transition: 0.2s;
            font-size: 1rem;
        }

        input:focus, textarea:focus {
            border-color: #b38f00;
            background-color: #222;
        }

        textarea {
            height: 120px;
            resize: vertical;
            line-height: 1.6;
        }

        /* The Execute Button (Morra's efficiency) */
        button {
            background: linear-gradient(145deg, #222, #111);
            color: #b38f00;
            border: 1px solid #333;
            padding: 12px 25px;
            font-weight: bold;
            border-radius: 2px;
            cursor: pointer;
            width: 100%;
            font-size: 1rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: 0.3s ease-in-out;
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.05);
        }

        button:hover {
            border-color: #b38f00;
            background: linear-gradient(145deg, #333, #222);
            box-shadow: 0 0 10px rgba(179, 143, 0, 0.3);
        }

        button:disabled {
            color: #444;
            border-color: #222;
            cursor: not-allowed;
            background: #111;
        }

        #status-msg {
            color: #ffd700;
            font-size: 0.9em;
            text-align: center;
            margin-top: 15px;
            font-style: italic;
        }

        /* --- THE LEDGER (HISTORICAL RECORD) --- */
        #diary-entries {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .entry {
            background-color: #111;
            padding: 20px;
            border-radius: 2px;
            border-left: 3px solid #333;
            transition: border-color 0.3s;
        }

        .entry:hover {
            border-left-color: #b38f00;
        }

        .date {
            font-size: 0.8em;
            color: #888;
            margin-bottom: 12px;
            border-bottom: 1px solid #222;
            padding-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .text-content {
            white-space: pre-wrap; 
            line-height: 1.7;
            font-family: 'Courier New', Courier, monospace;
            color: #c0c0c0;
        }

        #loading {
            color: #b38f00;
            font-style: italic;
            text-align: center;
            margin-top: 30px;
            letter-spacing: 2px;
        }
    </style>
</head>
<body>

    <div id="arch-header">
        <svg id="arch-logo" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
            <path d="M416 128c0-11.3-9.1-20.4-20.4-20.4H116.4c-11.3 0-20.4 9.1-20.4 20.4v256c0 11.3 9.1 20.4 20.4 20.4h279.1c11.3 0 20.4-9.1 20.4-20.4V128zm-20.4 235.6H116.4V148.4h279.1v215.2z"/>
            <path d="M256 160c-53 0-96 43-96 96s43 96 96 96 96-43 96-96-43-96-96-96zm0 160c-35.3 0-64-28.7-64-64s28.7-64 64-64 64 28.7 64 64-28.7 64-64 64z"/>
            <path d="M128 320c0 11.3 9.1 20.4 20.4 20.4h215.2c11.3 0 20.4-9.1 20.4-20.4v-44.4h-32v24.4H160V292.4h-32V320z"/>
            <path d="M480 32C32 32 32 480 32 480s224-224 224-224 224 224 224 224S480 32 480 32zM256 224s-96 96-96 160h192c0-64-96-160-96-160z"/>
        </svg>
        <h1>Operations Command</h1>
    </div>

    <div class="admin-panel">
        <input type="password" id="master-key" placeholder="AUTHENTICATION PROTOCOL KEY">
        <textarea id="diary-text" placeholder="SECURE CHRONICLE ENTRY - [DATA INPUT STREAM]..."></textarea>
        <button onclick="addEntry()">Execute Commit to Ledger</button>
        <p id="status-msg"></p>
    </div>

    <div id="loading">Cipher protocols initialising. Syncing with central hub...</div>
    <div id="diary-entries"></div>

    <script>
        /* --- CORE CONFIGURATION (DO NOT ALTER) --- */
        const BIN_ID = "6a2b2c06f5f4af5e29e27ad5"; 
        const API_URL = `https://api.jsonbin.io/v3/b/${BIN_ID}`;
        
        let currentEntries = [];

        /* Fetch data: Read access is standard protocol */
        async function fetchEntries() {
            try {
                const response = await fetch(`${API_URL}/latest`);
                const data = await response.json();
                currentEntries = data.record;
                renderEntries();
            } catch (error) {
                document.getElementById('loading').innerText = "Protocol error: Synchronisation failed.";
            }
        }

        /* Visualize the Ledger: Optimal clarity required */
        function renderEntries() {
            const container = document.getElementById('diary-entries');
            document.getElementById('loading').style.display = 'none';
            container.innerHTML = '';

            [...currentEntries].reverse().forEach(entry => {
                const div = document.createElement('div');
                div.className = 'entry';
                div.innerHTML = `
                    <div class="date">${entry.date}</div>
                    <div class="text-content">${entry.text}</div>
                `;
                container.appendChild(div);
            });
        }

        /* Commit entry: Authentication standard protocol enforced */
        async function addEntry() {
            const masterKey = document.getElementById('master-key').value;
            const text = document.getElementById('diary-text').value;
            const statusMsg = document.getElementById('status-msg');
            const commitBtn = document.querySelector('button');

            if (!masterKey || !text) {
                statusMsg.innerText = "Protocol Violation: Authentication and Entry data required.";
                return;
            }

            statusMsg.innerText = "Commit in progress. Encrypting data stream...";
            commitBtn.disabled = true;

            const newEntry = {
                /* Turkish locale preserved for local operations context */
                date: new Date().toLocaleString('tr-TR'),
                text: text
            };
            currentEntries.push(newEntry);

            try {
                const response = await fetch(API_URL, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-Master-Key': masterKey
                    },
                    body: JSON.stringify(currentEntries)
                });

                if (response.ok) {
                    statusMsg.innerText = "Protocol Accepted. Ledger Updated.";
                    document.getElementById('diary-text').value = ''; 
                    renderEntries(); 
                } else {
                    statusMsg.innerText = "Error: Protocol violation. Key mismatch or data corrupted.";
                    currentEntries.pop(); 
                }
            } catch (error) {
                statusMsg.innerText = "Error: Transmission failure. Network compromised?";
                currentEntries.pop();
            } finally {
                commitBtn.disabled = false;
                /* Optional security delay: Clear status after analysis */
                setTimeout(() => { statusMsg.innerText = ""; }, 3000);
            }
        }

        /* Execute initial protocols */
        fetchEntries();
    </script>
</body>
</html>
